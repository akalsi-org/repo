name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Restore bootstrap cache
        id: cache_bootstrap
        uses: actions/cache/restore@v4
        with:
          path: |
            .local/toolchain
            .local/stamps
          key: repo_bootstrap_${{ matrix.arch }}_${{ hashFiles('bootstrap/vars/local_cache_key.sh', '.agents/repo.json', 'bootstrap/tools/*.sh') }}
          restore-keys: |
            repo_bootstrap_${{ matrix.arch }}_

      - name: Bootstrap
        run: ./repo.sh true

      - name: Environment smoke
        run: |
          ./repo.sh bash -eux -c '
            test "$REPO_ARCH" = "${{ matrix.arch }}"
            test -n "$REPO_ROOT"
            test -n "$REPO_LOCAL"
            test -n "$REPO_TOOLCHAIN"
          '

      - name: Setup status
        run: ./repo.sh setup --status

      - name: Agent check
        run: ./repo.sh agent_check --stale-only

      - name: Source mirrors
        run: ./repo.sh source_mirror list

      - name: agent_check tests
        run: ./repo.sh python3 -m unittest discover tools/agent_check_tests

      - name: agent KB tests
        run: ./repo.sh python3 -m unittest discover tools/agent_kb_tests

      - name: Whitespace check
        run: git diff --check

      - name: Pack bootstrap artifacts
        if: github.event_name != 'pull_request'
        run: |
          ./repo.sh __repo_pack_bootstrap_artifacts /tmp/repo_bootstrap_artifacts
          mkdir -p /tmp/repo_bootstrap_artifacts
          touch /tmp/repo_bootstrap_artifacts/EMPTY

      - name: Upload bootstrap artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap_artifacts_${{ matrix.arch }}
          path: /tmp/repo_bootstrap_artifacts/*
          if-no-files-found: error

      - name: Save bootstrap cache
        if: github.event_name != 'pull_request' && steps.cache_bootstrap.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .local/toolchain
            .local/stamps
          key: ${{ steps.cache_bootstrap.outputs.cache-primary-key }}

  publish_bootstrap_artifacts:
    name: publish bootstrap artifacts
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO_BOOTSTRAP_ARTIFACT_TAG: bootstrap_artifacts_v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: bootstrap_artifacts_*
          path: /tmp/repo_bootstrap_artifacts
          merge-multiple: true

      - name: Publish bootstrap artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(/tmp/repo_bootstrap_artifacts/*.tar.gz)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "bootstrap artifacts: none configured"
            exit 0
          fi
          python3 tools/bootstrap_artifact_release.py publish \
            --repo "${{ github.repository }}" \
            --tag "$REPO_BOOTSTRAP_ARTIFACT_TAG" \
            "${artifacts[@]}"
